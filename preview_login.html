<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AutoRent - Inicio de Sesión</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0f766e; --primary-hover: #115e59; --secondary-color: #1e3a8a;
            --bg-color: #f3f4f6; --text-color: #1f2937; --text-light: #6b7280;
            --border-color: #e5e7eb; --white: #ffffff; --danger: #ef4444;
            --transition: 0.3s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.5; }
        
        .w-full { width: 100%; }
        .text-center { text-align: center; }
        .text-primary { color: var(--primary-color); text-decoration: none; font-weight: 500; }
        .text-primary:hover { text-decoration: underline; }
        .text-sm { font-size: 0.875rem; }
        .text-light { color: var(--text-light); }
        .mt-2 { margin-top: 1rem; }

        .btn { display: inline-block; padding: 0.75rem 1.5rem; font-size: 1rem; font-weight: 500; border: none; border-radius: 0.375rem; cursor: pointer; transition: var(--transition); text-align: center; text-decoration: none; }
        .btn-primary { background-color: var(--primary-color); color: var(--white); }
        .btn-primary:hover { background-color: var(--primary-hover); }

        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-color); }
        .form-control { width: 100%; padding: 0.75rem 1rem; font-size: 1rem; border: 1px solid var(--border-color); border-radius: 0.375rem; transition: var(--transition); }
        .form-control:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1); }
        .form-check { display: flex; align-items: center; gap: 0.5rem; }

        /* Auth Layout */
        .auth-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .auth-card { background: var(--white); padding: 2.5rem; border-radius: 0.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); width: 100%; max-width: 400px; }
        .auth-header { text-align: center; margin-bottom: 2rem; }
        .auth-header h1 { color: var(--primary-color); font-size: 1.75rem; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1>AutoRent</h1>
                <p class="text-light">Bienvenido de nuevo, ingresa a tu cuenta</p>
            </div>

            <form onsubmit="event.preventDefault(); alert('¡Visualización del Formulario Exitosa! Esto conectaría con Laravel.');">
                <div class="form-group">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <input type="email" id="email" class="form-control" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="********" required>
                </div>

                <div class="form-group form-check" style="justify-content: space-between;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" name="remember" id="remember">
                        Recordarme
                    </label>
                    <a href="#" class="text-primary text-sm">¿Olvidaste tu contraseña?</a>
                </div>

                <div class="form-group mt-2">
                    <button type="submit" class="btn btn-primary w-full">Ingresar</button>
                </div>
                
                <div class="text-center mt-2">
                    <p class="text-sm text-light">
                        ¿No tienes una cuenta? <a href="#" class="text-primary">Regístrate</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
